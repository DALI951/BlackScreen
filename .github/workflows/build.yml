name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v -keystore /tmp/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=BlackScreen, OU=Dev, O=Dev, L=Unknown, ST=Unknown, C=US"

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon
        env:
          KEYSTORE_FILE: /tmp/debug.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlackScreen
          path: ${{ steps.find-apk.outputs.apk_path }}

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp "${{ steps.find-apk.outputs.apk_path }}" "BlackScreen-v${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: BlackScreen-v${{ steps.version.outputs.version }}.apk
          name: BlackScreen v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
